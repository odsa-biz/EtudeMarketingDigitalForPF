[build]
  publish = "."
  command = "echo 'Site ready'"

# Fichiers statiques — ne pas rediriger
[[redirects]]
  from = "/robots.txt"
  to = "/robots.txt"
  status = 200

[[redirects]]
  from = "/llms.txt"
  to = "/llms.txt"
  status = 200

[[redirects]]
  from = "/sitemap.xml"
  to = "/sitemap.xml"
  status = 200

# Pages HTML
[[redirects]]
  from = "/etude"
  to = "/#offres"
  status = 301

[[redirects]]
  from = "/aides"
  to = "/aides/index.html"
  status = 200

[[redirects]]
  from = "/exemple-etude"
  to = "/#offres"
  status = 301

[[redirects]]
  from = "/blog"
  to = "/blog/index.html"
  status = 200

[[redirects]]
  from = "/blog/:slug"
  to = "/blog/:slug.html"

[[redirects]]
  from = "/veterinaires"
  to = "/veterinaires.html"
  status = 200

[[redirects]]
  from = "/comptables"
  to = "/comptables.html"
  status = 200

[[redirects]]
  from = "/opticiens"
  to = "/opticiens.html"
  status = 200

[[redirects]]
  from = "/cgv"
  to = "/cgv.html"
  status = 200

[[redirects]]
  from = "/cookies"
  to = "/cookies.html"
  status = 200

[[redirects]]
  from = "/confidentialite"
  to = "/confidentialite.html"
  status = 200

[[redirects]]
  from = "/mentions-legales"
  to = "/mentions-legales.html"
  status = 200

# Headers sécurité
[[headers]]
  for = "/*"
  [headers.values]
    X-Frame-Options = "DENY"
    X-Content-Type-Options = "nosniff"
    Referrer-Policy = "strict-origin-when-cross-origin"
    X-XSS-Protection = "1; mode=block"
    Permissions-Policy = "camera=(), microphone=(), geolocation=()"
    Content-Security-Policy = "default-src 'self'; script-src 'self' 'unsafe-inline' https://www.googletagmanager.com https://www.google-analytics.com https://cdn.jotfor.ms; style-src 'self' 'unsafe-inline' https://fonts.googleapis.com; font-src 'self' https://fonts.gstatic.com; img-src 'self' data: https:; connect-src 'self' https://www.google-analytics.com https://region1.google-analytics.com; frame-src https://form.jotform.com https://www.youtube.com; object-src 'none';"

# Cache assets (1 an)
[[headers]]
  for = "/assets/*"
  [headers.values]
    Cache-Control = "public, max-age=31536000, immutable"

# Cache HTML (1h)
[[headers]]
  for = "/*.html"
  [headers.values]
    Cache-Control = "public, max-age=3600, must-revalidate"

# llms.txt — forcer text/plain
[[headers]]
  for = "/llms.txt"
  [headers.values]
    Content-Type = "text/plain; charset=utf-8"
    Cache-Control = "public, max-age=86400"
